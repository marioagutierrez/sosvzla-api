basePath: /
definitions:
  domain.Hospital:
    properties:
      address:
        type: string
      city:
        type: string
      country:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      phone_number:
        type: string
      state:
        type: string
    type: object
  domain.HospitalPerson:
    properties:
      admission_date:
        type: string
      discharge_date:
        type: string
      hospital_id:
        type: integer
      id:
        type: integer
      notes:
        type: string
      person_id:
        type: integer
    type: object
  domain.Person:
    properties:
      birth_date:
        type: string
      created_at:
        type: string
      full_name:
        type: string
      gender:
        type: string
      id:
        type: integer
      last_seen_date:
        type: string
      last_seen_location:
        type: string
      national_id:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  domain.Report:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      person_id:
        type: integer
      report_type:
        type: string
      reporter_contact:
        type: string
      reporter_name:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: duckerman@sosvzla.lat
    name: API Support
    url: https://github.com/DuckerMan
  description: This is a centralized microservice for tracking missing, found, and
    hospitalized persons in Venezuela.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: SOS Venezuela Missing Persons API
  version: "1.0"
paths:
  /hospitals:
    get:
      description: Retrieve a list of registered hospitals with pagination.
      parameters:
      - description: 'Pagination limit (default: 10)'
        in: query
        name: limit
        type: integer
      - description: 'Pagination offset (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Hospital'
            type: array
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List hospitals
      tags:
      - hospitals
    post:
      consumes:
      - application/json
      description: Register a health center to track admitted persons.
      parameters:
      - description: Hospital Object
        in: body
        name: hospital
        required: true
        schema:
          $ref: '#/definitions/domain.Hospital'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Hospital'
        "400":
          description: Invalid payload
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a hospital
      tags:
      - hospitals
  /hospitals/{id}/admit:
    post:
      consumes:
      - application/json
      description: Associate a person with a hospital admission.
      parameters:
      - description: Hospital ID
        in: path
        name: id
        required: true
        type: integer
      - description: Hospital Person association details
        in: body
        name: admission
        required: true
        schema:
          $ref: '#/definitions/domain.HospitalPerson'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.HospitalPerson'
        "400":
          description: Invalid ID or payload
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Admit a person to a hospital
      tags:
      - hospitals
  /hospitals/{id}/persons:
    get:
      description: Retrieve a list of persons who are currently admitted or listed
        in a specific hospital.
      parameters:
      - description: Hospital ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Person'
            type: array
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List persons admitted in a hospital
      tags:
      - hospitals
  /persons:
    get:
      description: Retrieve a list of persons, optionally filtered by status (missing,
        found, in_hospital) or searched by national_id.
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Search by National ID (Cédula)
        in: query
        name: national_id
        type: string
      - description: 'Pagination limit (default: 10)'
        in: query
        name: limit
        type: integer
      - description: 'Pagination offset (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Person'
            type: array
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List or search persons
      tags:
      - persons
    post:
      consumes:
      - application/json
      description: Register a missing, found, or in_hospital person in the centralized
        database.
      parameters:
      - description: Person Object
        in: body
        name: person
        required: true
        schema:
          $ref: '#/definitions/domain.Person'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Person'
        "400":
          description: Invalid payload
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new person
      tags:
      - persons
  /persons/{id}:
    delete:
      description: Remove a person's entry from the database.
      parameters:
      - description: Person ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a person
      tags:
      - persons
    get:
      description: Get details of a registered person using their database ID.
      parameters:
      - description: Person ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Person'
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Person not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a person by ID
      tags:
      - persons
    put:
      consumes:
      - application/json
      description: Update the personal details or status of a person.
      parameters:
      - description: Person ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated Person Object
        in: body
        name: person
        required: true
        schema:
          $ref: '#/definitions/domain.Person'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Person'
        "400":
          description: Invalid ID or payload
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a person
      tags:
      - persons
  /persons/{id}/reports:
    get:
      description: Retrieve all filed reports associated with a specific person ID.
      parameters:
      - description: Person ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Report'
            type: array
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List reports for a person
      tags:
      - reports
  /persons/national/{national_id}:
    get:
      description: Get details of a registered person using their national identification
        number (e.g., Cédula).
      parameters:
      - description: National ID
        in: path
        name: national_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Person'
        "404":
          description: Person not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a person by National ID
      tags:
      - persons
  /reports:
    post:
      consumes:
      - application/json
      description: Create a report regarding a missing or found person.
      parameters:
      - description: Report Object
        in: body
        name: report
        required: true
        schema:
          $ref: '#/definitions/domain.Report'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Report'
        "400":
          description: Invalid payload
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: File a search/found report
      tags:
      - reports
swagger: "2.0"
